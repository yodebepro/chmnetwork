<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Admin Login | CHM Church of God</title>
<link rel="stylesheet" href="admin.css"/>
<style>
/* Guaranteed centering — works even if admin.css fails to load */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:'Jost','Segoe UI',sans-serif;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:linear-gradient(150deg,#0a1f44 0%,#122855 55%,#1a3060 100%);
  padding:1.5rem;
  position:relative;
  overflow:hidden;
}
body::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse 70% 60% at 15% 50%,rgba(200,145,58,.1),transparent);
  pointer-events:none;
}
.login-card{
  background:#ffffff;
  border-radius:24px;
  padding:2.75rem 2.25rem;
  width:100%;
  max-width:420px;
  position:relative;
  z-index:2;
  box-shadow:0 32px 80px rgba(0,0,0,.35);
}
.login-logo{text-align:center;margin-bottom:1.75rem}
.login-logo img{height:70px;object-fit:contain;display:block;margin:0 auto .75rem}
.login-logo h1{font-family:Georgia,serif;font-size:1.5rem;color:#0a1f44;font-weight:700}
.login-logo p{font-size:.8rem;color:#6b7280;margin-top:.25rem}
.gold-bar{width:44px;height:3px;background:linear-gradient(90deg,#c8913a,#e0a84c);margin:.9rem auto;border-radius:2px}
.login-error{
  background:#fef2f2;border:1px solid #fecaca;color:#dc2626;
  border-radius:10px;padding:.65rem .9rem;font-size:.8rem;font-weight:600;
  margin-bottom:.9rem;display:none;
}
.form-group{margin-bottom:1.1rem}
.form-label{display:block;font-size:.8rem;font-weight:700;color:#0a1f44;margin-bottom:.4rem}
.form-input{
  width:100%;padding:.78rem 1rem;
  border:1.5px solid #e4e7ec;border-radius:10px;
  font-size:.88rem;color:#111827;background:#fff;
  outline:none;transition:.2s;font-family:inherit;
}
.form-input:focus{border-color:#c8913a;box-shadow:0 0 0 3px rgba(200,145,58,.12)}
.login-btn{
  width:100%;padding:.9rem;
  background:linear-gradient(135deg,#0a1f44,#122855);
  color:#c8913a;border-radius:50px;
  font-family:inherit;font-size:.82rem;font-weight:700;
  letter-spacing:.08em;text-transform:uppercase;
  cursor:pointer;border:none;margin-top:.35rem;
  box-shadow:0 4px 18px rgba(10,31,68,.3);
  transition:.2s;
}
.login-btn:hover{transform:translateY(-1px);box-shadow:0 8px 28px rgba(10,31,68,.4)}
.login-footer{text-align:center;font-size:.72rem;color:#9ca3af;margin-top:1.25rem;font-style:italic}
</style>
</head>
<body>
<div class="login-card">
  <div class="login-logo">
    <img src="logo-dark.png" alt="CHM Church of God" onerror="this.style.display='none'"/>
    <h1>CHM Church of God</h1>
    <p>Admin Panel · Secure Access</p>
    <div class="gold-bar"></div>
  </div>
  <div class="login-error" id="loginErr">❌ Invalid username or password.</div>
  <div class="form-group">
    <label class="form-label">Username</label>
    <input type="text" class="form-input" id="lu" placeholder="admin" autocomplete="username"/>
  </div>
  <div class="form-group">
    <label class="form-label">Password</label>
    <input type="password" class="form-input" id="lp" placeholder="••••••••" autocomplete="current-password"/>
  </div>
  <button class="login-btn" onclick="doLogin()">Sign In →</button>
  <p class="login-footer">Prayer · Holiness · Restoration · Transformation</p>
</div>

<script src="admin.js"></script>
<script>
if(isLoggedIn()) window.location.href='dashboard.html';

function doLogin(){
  const u=document.getElementById('lu').value.trim();
  const p=document.getElementById('lp').value;
  if(u===ADMIN_USER && p===ADMIN_PASS){
    sessionStorage.setItem(SESSION_KEY,'true');
    window.location.href='dashboard.html';
  } else {
    document.getElementById('loginErr').style.display='block';
    document.getElementById('lp').value='';
  }
}
document.addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });
</script>



<script src="contact-direct-send.js"></script>
</body></html>
