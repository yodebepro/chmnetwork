<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>CHM Network Redirect</title>
<script>
(function(){
  var path = (window.location.pathname || "").toLowerCase().replace(/\/+$/, "");
  var origin = window.location.origin;
  var repoBase = "";

  // Works for custom domain root and GitHub project pages.
  var parts = window.location.pathname.split("/").filter(Boolean);
  if(origin.indexOf("github.io") !== -1 && parts.length > 0){
    repoBase = "/" + parts[0];
  }

  if(path.endsWith("/admin") || path.endsWith("/admin/index.html") || path.endsWith("/admin.html") || path.endsWith("/login.html")){
    window.location.replace(origin + repoBase + "/index.html?admin=1");
  } else {
    window.location.replace(origin + repoBase + "/index.html");
  }
})();
</script>
</head>
<body>
<p>Redirecting...</p>
</body>
</html>
